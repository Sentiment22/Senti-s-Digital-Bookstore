<!DOCTYPE html>
<html>
<head>
    <title>Digital Book Store</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>📚 Digital Book Store</h1>
            <p>Download ebooks instantly after purchase</p>
        </div>
        <button id="cart-toggle" class="cart-btn">🛒 Cart <span id="cart-count">0</span></button>
    </header>

    <div class="main-container">
        <div class="books-section">
            <div class="container" id="books-container">
                <!-- Books will be dynamically loaded here -->
            </div>
        </div>

        <aside class="cart-sidebar" id="cart-sidebar">
            <div class="cart-header">
                <h2>Shopping Cart</h2>
                <button id="close-cart" class="close-btn">✕</button>
            </div>
            <div class="cart-items" id="cart-items">
                <p class="empty-cart">Your cart is empty</p>
            </div>
            <div class="cart-summary">
                <div class="summary-row">
                    <span>Subtotal:</span>
                    <span id="subtotal">£0.00</span>
                </div>
                <div class="summary-row">
                    <span>Tax (20%):</span>
                    <span id="tax">£0.00</span>
                </div>
                <div class="summary-row total">
                    <span>Total:</span>
                    <span id="total">£0.00</span>
                </div>
                <button id="checkout-btn" class="checkout-btn" disabled>Proceed to Checkout</button>
            </div>
        </aside>
    </div>

    <footer>
        <p>© 2026 Digital Book Store | All Rights Reserved</p>
    </footer>

    <div id="checkout-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Checkout</h2>
            <form id="checkout-form">
                <div class="form-group">
                    <label for="name">Full Name:</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label for="card">Card Number:</label>
                    <input type="text" id="card" placeholder="1234 5678 9012 3456" maxlength="19" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="expiry">Expiry Date:</label>
                        <input type="text" id="expiry" placeholder="MM/YY" maxlength="5" required>
                    </div>
                    <div class="form-group">
                        <label for="cvv">CVV:</label>
                        <input type="text" id="cvv" placeholder="123" maxlength="3" required>
                    </div>
                </div>
                <button type="submit" class="payment-btn">Complete Purchase - <span id="final-total">£0.00</span></button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
